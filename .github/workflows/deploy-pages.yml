name: Deploy to GitHub Pages

# Auto-publishes a parallel mirror of the app at
#   https://aritrade.github.io/productiveyou/
# whenever main moves. Independent of Lovable's manual publish flow, so
# if Lovable's UI ever gets stuck again, this URL always tracks main.
#
# The host is aritrade.github.io (not productdecoded.github.io) because
# this GitHub account was renamed from productdecoded → aritrade. GitHub
# redirects repository URLs but NOT Pages subdomains, so the only working
# Pages URL is the one tied to the current username.
#
# Supabase auth on this mirror requires:
#   1. VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY GitHub Actions
#      variables (Repository Settings → Secrets and variables → Actions →
#      Variables). Defaults to the .env file in the repo if unset.
#   2. The Supabase project's Authentication → URL Configuration must list
#      https://aritrade.github.io as an allowed Site URL / redirect.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite, base=/productiveyou/)
        env:
          BASE_PATH: /productiveyou/
          # Supabase config is intentionally NOT passed through here.
          # Vite auto-loads the committed .env file at build time. If we set
          # VITE_SUPABASE_* via the workflow and the corresponding GH Actions
          # Variables aren't defined, GitHub passes an empty string which
          # then shadows the .env file value — silently shipping a broken
          # build with createClient("", "") that throws at runtime.
          # To override (e.g. point the mirror at a different Supabase
          # project), uncomment + populate via repo Settings → Variables.
          # VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          # VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
        run: npm run build

      - name: Sanity check — Supabase URL baked into bundle
        run: |
          set -e
          if ! /usr/bin/grep -qE 'https://[a-z0-9]+\.supabase\.co' dist/assets/index-*.js; then
            echo "✗ Supabase URL is missing from the built bundle — the app will white-screen."
            echo "  Either the .env file was empty or a workflow env var shadowed it with ''."
            exit 1
          fi
          echo "✓ Supabase URL present in bundle"

      - name: Add SPA fallback + disable Jekyll
        run: |
          # GH Pages serves 404.html for any unmatched route — public/404.html
          # is already copied into dist/, but if it's missing for any reason
          # fall back to a copy of index.html (also valid for SPA routing).
          if [ ! -f dist/404.html ]; then
            cp dist/index.html dist/404.html
          fi
          touch dist/.nojekyll
          ls -la dist/

      - name: Verify PWA assets in build output
        run: |
          set -e
          for f in manifest.webmanifest sw.js .well-known/assetlinks.json \
                   icons/icon-192.png icons/icon-512.png \
                   icons/icon-maskable-512.png icons/apple-touch-icon.png \
                   favicon.ico 404.html; do
            if [ ! -f "dist/$f" ]; then
              echo "✗ missing dist/$f"
              exit 1
            fi
            printf "  ✓ dist/%s  (%s bytes)\n" "$f" "$(wc -c < "dist/$f" | tr -d ' ')"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
