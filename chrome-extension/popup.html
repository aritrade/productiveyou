<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monk Mode</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <div class="header-left">
        <div class="logo">⚡</div>
        <div>
          <h1 class="title">MONK MODE</h1>
          <p class="subtitle">Activated</p>
        </div>
      </div>
      <div class="today-badge" id="todayBadge">0%</div>
    </header>

    <section class="section">
      <h2 class="section-title">🛡️ Non-Negotiables</h2>
      <div id="nonNegList" class="checklist"></div>
    </section>

    <section class="section">
      <h2 class="section-title">📋 Daily Habits</h2>
      <div id="habitList" class="checklist"></div>
    </section>

    <div class="streak-bar">
      <span class="streak-label">🔥 Current Streak</span>
      <span class="streak-value" id="streakValue">0 days</span>
    </div>

    <a href="https://productiveneel.lovable.app" target="_blank" class="open-app">Open Full Dashboard →</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
