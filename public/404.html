<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Monk Mode Activated</title>
    <script>
      // Single Page Apps for GitHub Pages — Rafael Pedicini, MIT
      // https://github.com/rafgraph/spa-github-pages
      //
      // GitHub Pages serves this file for any 404. We encode the requested
      // path + query into the index.html's query string, then index.html
      // (see <body> top script) decodes it and replaces the URL with the
      // original. Result: deep links like /productiveyou/history just work.
      //
      // pathSegmentsToKeep = 1 because user-pages mount projects at /<repo>/.
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
          "/?/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
